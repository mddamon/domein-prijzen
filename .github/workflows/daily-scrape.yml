name: Daily competitor price scrape

on:
  schedule:
    - cron: "30 5 * * *"  # 06:30 CET (winter) / 07:30 CEST (summer)
  workflow_dispatch:

permissions:
  contents: write
  issues: write  # nodig om alert-issues te kunnen aanmaken

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_number }}
          path: |
            debug-artifacts/
            scrape-log.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Detect price changes
        run: python alert.py

      - name: Commit history & log
        id: commit
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add history.json scrape-log.txt
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No history changes today."
          else
            git commit -m "Daily prices: $(date -u +'%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if prices changed
        if: hashFiles('alert-body.md') != ''
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "📈 Prijswijzigingen — ${{ github.event.repository.updated_at }}"
          content-filepath: alert-body.md
          labels: price-change, automated
          assignees: ${{ github.repository_owner }}
